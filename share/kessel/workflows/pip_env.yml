variables:
   python: python3
steps:
 - name: setup
   title: Setup
   collapsed: true
   script:
    - env_dir=$build_dir/envs
    - env=$env_dir/$environment
    - mkdir -p $env_dir
    - |
      if [[ ! -d $env ]]; then
          $python -m venv $env
      fi
      source $env/bin/activate
      if [[ ${?} -ne 0 ]]; then
          echo "Failed to activate environment"
          false
      fi
    - python3 -m pip install -r $requirements
    - deactivate
    - kessel build-env set ${env}/bin/activate
