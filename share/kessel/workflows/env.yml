arguments:
  - argument:
      - '-e'
      - '--env'
      - default: $env
  - argument:
      - '-S'
      - '--source-dir'
      - default: $cwd
  - argument:
      - '-B'
      - '--build-dir'
      - default: "$cwd/build"
  - argument:
      - "spec"
      - nargs: '?'
      - default: $spec
steps:
 - name: env
   title: Prepare Environment
   script:
    - kessel pipeline env -e $env -S $source_dir -B $build_dir $spec
