arguments:
  - argument:
      - '-e'
      - '--env'
      - default: $environment
        dest: environment
        help: "environment that should be used (default: %(default)s)"
  - argument:
      - '-S'
      - '--source-dir'
      - default: $cwd
        help: "source directory (default: %(default)s)"
  - argument:
      - '-B'
      - '--build-dir'
      - default: $build_dir
        help: "build directory (default: %(default)s)"
  - argument:
      - "project_spec"
      - nargs: '?'
        default: $spec
        metavar: spec
        help: "spec to build (default: %(default)s)"
steps:
 - name: env
   title: Prepare Environment
   arguments:
    - argument:
        - '-e'
        - '--env'
        - default: $environment
          help: "environment that should be used (default: %(default)s)"
    - argument:
        - '-S'
        - '--source-dir'
        - default: $cwd
        - help: "source directory (default: %(default)s)"
    - argument:
        - '-B'
        - '--build-dir'
        - default: $build_dir
        - help: "build directory (default: %(default)s)"
    - argument:
        - "project_spec"
        - nargs: '?'
        - default: $spec
          metavar: spec
          help: "spec to build (default: %(default)s)"
   script:
    - kessel env activate $environment
    - |
      if [ -d "$source_dir/spack_repo/$project" ]; then
        spack repo remove $project 2> /dev/null > /dev/null || true
        spack repo add $source_dir/spack_repo/$project
      fi
    - |
      if [ -z "$project_version" ]; then
        export PROJECT_PREFERRED_VERSION=$(spack-python -c "spec = spack.spec.Spec('$project');pkg_cls = spack.repo.PATH.get_pkg_class(spec.fullname);print(spack.package_base.preferred_version(pkg_cls(spec)))")
      else
        export PROJECT_PREFERRED_VERSION="$project_version"
      fi
    - spack develop -b $build_dir -p $source_dir --no-clone $project@${PROJECT_PREFERRED_VERSION}
    - unset PROJECT_PREFERRED_VERSION
    - spack concretize -f 2> /dev/null > /dev/null || true
    - spack concretize -f
    - spack install --include-build-deps --only dependencies
