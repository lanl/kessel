arguments:
  - argument:
      - '-s'
      - '--system'
      - default: $system
        help: "system that should be used (default: %(default)s)"
steps:
 - name: setup
   title: Setup
   collapsed: true
   arguments:
     - argument:
         - '-s'
         - '--system'
         - default: $system
           help: "system that should be used (default: %(default)s)"
   script:
    - umask 0007
    - |
      if [[ "$system" == "local" ]]; then
        if [[ -z "${SPACK_ROOT}" ]]; then
          echo "No Spack installation active!" >&2
          false
        else
          echo "Using Spack install at ${SPACK_ROOT}"
        fi
      else
        export KESSEL_WORKFLOW_DEPLOYMENT_DIR=${KESSEL_WORKFLOW_DEPLOYMENT_DIR:-${TMPDIR}/${USER}-ci-env}
        if [ ! -d "${KESSEL_WORKFLOW_DEPLOYMENT_DIR}" ]; then
            unsquashfs -d ${KESSEL_WORKFLOW_DEPLOYMENT_DIR} $replicate_sqfs
            kessel deploy activate ${KESSEL_WORKFLOW_DEPLOYMENT_DIR}
        fi
      fi
    -
