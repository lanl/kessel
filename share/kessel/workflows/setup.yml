steps:
 - name: setup
   title: Setup
   collapsed: true
   arguments:
     - argument:
         - '-D'
         - '--deployment'
         - default: $workflow_deployment_dir
           help: "location of workflow deployment (default: %(default)s)"
     - argument:
         - '-s'
         - '--system'
         - default: $system
           help: "system that should be used (default: %(default)s)"
   script:
    - umask 0007
    - |
      if [[ "$system" == "local" ]]; then
        if [[ -z "${SPACK_ROOT}" ]]; then
          echo "No Spack installation active!" >&2
          false
        else
          echo "Using Spack install at ${SPACK_ROOT}"
        fi
      else
        if [ ! -d "$workflow_deployment_dir" ]; then
            unsquashfs -d $workflow_deployment_dir $replicate_sqfs
            kessel deploy activate $workflow_deployment_dir
        fi
      fi
    -
