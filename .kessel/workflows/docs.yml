variables:
  environment: docs
  project_spec: kessel@main
  python: $KESSEL_PYTHON
  requirements: $source_dir/doc/sphinx/requirements.txt
extends:
   - pip_env
steps:
  - name: html
    title: "Build HTML documentation"
    script:
      - run:
         - cd doc/sphinx
         - make html
        buildenv: true
