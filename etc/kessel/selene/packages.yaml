packages:
  gcc:
    externals:
    - spec: gcc@12.3.0 languages:='c,c++,fortran'
      prefix: /usr/projects/hpcsoft/tce/25.03/rhel8-x86_64-cc90/compilers/gcc/12.3.0
      extra_attributes:
        compilers:
          c: /usr/projects/hpcsoft/tce/25.03/rhel8-x86_64-cc90/compilers/gcc/12.3.0/bin/gcc
          cxx: /usr/projects/hpcsoft/tce/25.03/rhel8-x86_64-cc90/compilers/gcc/12.3.0/bin/g++
          fortran: /usr/projects/hpcsoft/tce/25.03/rhel8-x86_64-cc90/compilers/gcc/12.3.0/bin/gfortran
  cuda:
    prefer:
      - "@12.9.1"
  openmpi:
    require:
     - "fabrics=ucx schedulers=slurm"
     - "+cuda cuda_arch=90"
  mpich:
    require:
     - "+hydra +slurm +fortran device=ch4 netmod=ucx"
     - "+cuda cuda_arch=90"
  ucx:
    require:
     - "+cma+dc+rc+rdmacm+thread_multiple+ud+verbs %c,cxx=gcc"
     - "+cuda cuda_arch=90"
  libfabric:
    require:
     - "fabrics=verbs,shm,sockets,tcp,udp %c=gcc"
     - "+cuda cuda_arch=90"
  hwloc:
    require:
     - "+cuda cuda_arch=90"
  slurm:
    externals:
    - spec: slurm@24-11-6-1
      prefix: /usr
    buildable: false
  gawk:
    externals:
    - spec: gawk@4.2.1
      prefix: /usr
  doxygen:
    externals:
    - spec: doxygen@1.8.14+graphviz~mscgen
      prefix: /usr
  openssh:
    externals:
    - spec: openssh@8.0p1
      prefix: /usr
  m4:
    externals:
    - spec: m4@1.4.18
      prefix: /usr
  cmake:
    externals:
    - spec: cmake@3.26.5
      prefix: /usr
  sed:
    externals:
    - spec: sed@4.5
      prefix: /usr
  findutils:
    externals:
    - spec: findutils@4.6.0
      prefix: /usr
  pkgconf:
    externals:
    - spec: pkgconf@1.4.2
      prefix: /usr
  cvs:
    externals:
    - spec: cvs@1.11.23
      prefix: /usr
  tar:
    externals:
    - spec: tar@1.30
      prefix: /usr
  libtool:
    externals:
    - spec: libtool@2.4.6
      prefix: /usr
  python:
    externals:
    - spec: python@3.6.8+bz2+crypt+ctypes+dbm+lzma+pyexpat~pythoncmd+readline+sqlite3+ssl~tkinter+uuid+zlib
      prefix: /usr
  automake:
    externals:
    - spec: automake@1.16.1
