spack:
  extends: custom
  view:
    default:
      root: .spack-env/view
      exclude: [intel-oneapi-runtime, gcc-runtime]
  packages:
    c:
      prefer:
       - intel-oneapi-compilers
    cxx:
      prefer:
       - intel-oneapi-compilers
    fortran:
      prefer:
       - intel-oneapi-compilers
