packages:
  gcc:
    externals:
    - spec: gcc@13.2.0 languages:='c,c++,fortran'
      prefix: /projects/opt/rhel8/x86_64/gcc/13.2.0
      modules:
      - gcc/13.2.0
      extra_attributes:
        compilers:
          c: /projects/opt/rhel8/x86_64/gcc/13.2.0/bin/gcc
          cxx: /projects/opt/rhel8/x86_64/gcc/13.2.0/bin/g++
          fortran: /projects/opt/rhel8/x86_64/gcc/13.2.0/bin/gfortran
        flags: {}
        environment: {}
        extra_rpaths: []
  intel-oneapi-compilers:
    externals:
    - spec: intel-oneapi-compilers@2024.0.2
      prefix: /projects/opt/centos8/x86_64/oneAPI/2024.0.0.49564
      modules:
      - gcc/12.2.0
      - intel/2024.0.0
      extra_attributes:
        compilers:
          c: /projects/opt/centos8/x86_64/oneAPI/2024.0.0.49564/compiler/2024.0.0/linux/bin/icx
          cxx: /projects/opt/centos8/x86_64/oneAPI/2024.0.0.49564/compiler/2024.0.0/linux/bin/icpx
          fortran: /projects/opt/centos8/x86_64/oneAPI/2024.0.0.49564/compiler/2024.0.0/linux/bin/ifx
        flags: {}
        environment: {}
        extra_rpaths: []
  slurm:
    externals:
    - spec: slurm@25-11-1-1
      prefix: /usr
    buildable: false
  llvm:
    externals:
      - spec: llvm@13.0.0 +clang
        prefix: /projects/opt/centos8/x86_64/clang/13.0.0
        extra_attributes:
          compilers:
            c: /projects/opt/centos8/x86_64/clang/13.0.0/bin/clang
            cxx: /projects/opt/centos8/x86_64/clang/13.0.0/bin/clang++
      - spec: llvm@17.0.6 +clang
        prefix: /vast/projects/darwin_contrib/spack-builds/2025-01-30/rhel8/x86_64/llvm/17.0.6-gcc_13.2.0
        modules:
        - gcc/13.2.0
        - clang/17.0.6
        extra_attributes:
          compilers:
            c: /vast/projects/darwin_contrib/spack-builds/2025-01-30/rhel8/x86_64/llvm/17.0.6-gcc_13.2.0/bin/clang
            cxx: /vast/projects/darwin_contrib/spack-builds/2025-01-30/rhel8/x86_64/llvm/17.0.6-gcc_13.2.0/bin/clang++
      - spec: llvm@18.1.8 +clang
        prefix: /vast/projects/darwin_contrib/spack-builds/2025-01-30/rhel8/x86_64/llvm/18.1.8-gcc_13.2.0
        modules:
        - gcc/13.2.0
        - clang/18.1.8
        extra_attributes:
          compilers:
            c: /vast/projects/darwin_contrib/spack-builds/2025-01-30/rhel8/x86_64/llvm/18.1.8-gcc_13.2.0/bin/clang
            cxx: /vast/projects/darwin_contrib/spack-builds/2025-01-30/rhel8/x86_64/llvm/18.1.8-gcc_13.2.0/bin/clang++
      - spec: llvm@19.1.7 +clang
        prefix: /vast/projects/darwin_contrib/spack-builds/2025-03-07/rhel8/x86_64/llvm/19.1.7-gcc_13.2.0
        modules:
        - gcc/13.2.0
        - clang/19.1.7-offload
        extra_attributes:
          compilers:
            c: /vast/projects/darwin_contrib/spack-builds/2025-03-07/rhel8/x86_64/llvm/19.1.7-gcc_13.2.0/bin/clang
            cxx: /vast/projects/darwin_contrib/spack-builds/2025-03-07/rhel8/x86_64/llvm/19.1.7-gcc_13.2.0/bin/clang++
      - spec: llvm@20.1.8 +clang
        prefix: /vast/projects/darwin_contrib/spack-builds/2025-07-21/rhel8/x86_64/llvm/20.1.8-gcc_13.2.0
        modules:
        - gcc/13.2.0
        - clang/20.1.8-offload
        extra_attributes:
          compilers:
            c: /vast/projects/darwin_contrib/spack-builds/2025-07-21/rhel8/x86_64/llvm/20.1.8-gcc_13.2.0/bin/clang
            cxx: /vast/projects/darwin_contrib/spack-builds/2025-07-21/rhel8/x86_64/llvm/20.1.8-gcc_13.2.0/bin/clang++
            fortran: /vast/projects/darwin_contrib/spack-builds/2025-07-21/rhel8/x86_64/llvm/20.1.8-gcc_13.2.0/bin/flang
  openmpi:
    require:
      - "fabrics=ucx schedulers=slurm"
    conflict:
     - "^mpich"
  mpich:
    require:
     - "+hydra +slurm +fortran device=ch4 netmod=ucx"
    conflict:
     - "^openmpi"
  ucx:
    require:
     - "+cma+dc+rc+rdmacm+thread_multiple+ud+verbs+debug %c,cxx=gcc"
  libfabric:
    require:
     - spec: "fabrics=verbs,shm,sockets,tcp,udp %c=gcc"
  cuda:
    version: [12.9.1]
    externals:
    - spec: cuda@12.8.0
      prefix: /projects/darwin-nv/rhel8/x86_64/packages/cuda/12.8.0
      modules:
      - cuda/12.8.0
    - spec: cuda@12.9.1
      prefix: /projects/darwin-nv/rhel8/x86_64/packages/cuda/12.9.1
      modules:
      - cuda/12.9.1
  curl:
    externals:
    - spec: curl@7.61.1
      prefix: /usr
    buildable: false
  openssh:
    externals:
      - spec: openssh@8.0p1
        prefix: /usr
    buildable: false
  diffutils:
    externals:
    - spec:    diffutils@3.6
      prefix:  /usr
    buildable: false
  numactl:
    externals:
    - spec: numactl@system
      prefix: /usr
    buildable: false
  git:
    externals:
    - spec: git@2.39.3
      prefix: /usr
